version: '3.8'
 
services:
 
  # ── PostgreSQL ───────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: examen_postgres
    environment:
      POSTGRES_DB:       examendb
      POSTGRES_USER:     ander
      POSTGRES_PASSWORD: 12345
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ander -d examendb']
      interval: 10s
      retries: 5
 
  # ── pgAdmin ──────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: container-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL:    asl.narvaez@yavirac.edu.ec
      PGADMIN_DEFAULT_PASSWORD: 12345
    ports:
      - '5050:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
 
  # ── Flask App ─────────────────────────────────────────────────────
  flask_app:
    build: .
    container_name: container-flask
    environment:
      APP_NAME:    DevOps Examen App
      APP_VERSION: '1.0.0'
      DB_HOST:     postgres
      DB_NAME:     examendb
      DB_USER:     ander
      DB_PASS:     12345
      DB_PORT:     '5432'
    ports:
      - '5000:5000'
    depends_on:
      postgres:
        condition: service_healthy
 
volumes:
  postgres_data:
  pgadmin_data:
